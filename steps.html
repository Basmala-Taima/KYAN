<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كيان</title>
    <link rel="icon" type="image/x-icon" href="images/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&family=Lilita+One&family=Merriweather:ital,opsz,wdth,wght@0,18..144,105,300..900;1,18..144,105,300..900&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="CSS/output.css">
    <link rel="stylesheet" href="CSS/steps.css">
</head>
<body id="body" class="bg-[url(/images/خلفية2.png)] bg-center bg-cover bg-no-repeat bg-fixed transition-colors duration-200">
    <header id="header" class="w-full px-6.25 flex justify-between items-center sticky top-0 z-50">
        <a href="index.html#hero"> <!-- logo -->
            <img src="images/لوجو.png" alt="شعار كيان" class="w-30 h-30">
        </a>
        <nav class="flex justify-evenly items-center gap-2"> <!--navbar-->
                <a href="stepsEN.html" class="text-[35px] text-blue-900 font-semibold p-2 hover:bg-gray-400/35 hover:rounded hover:text-blue-900/85" title="تحويل إلى الإنجليزية"><i class="fa-solid fa-globe"></i></a>
                <a href="index.html" class="text-[35px] transition-all text-blue-900 font-semibold p-2 hover:bg-gray-400/35  hover:rounded hover:text-blue-900/85 hover:border-blue-900 "><i class="fa-solid fa-house"></i></a>
        </nav>
    </header> <!--navBar-->
    <main class="lg:h-[90vh]">
        <section class="strength-section">
            <div class="content">
                <h2 class="strength-title">خطوات القوة</h2>
                <p>اضغطي على أي نوع تمرين للحصول على فكرة عشوائية جديدة</p>
            </div>
            <div class="steps flex flex-col lg:flex-row  py-10 lg:py-0">
                <div class="step-card" onclick="openExercise('spirit')">
                    <div class="step-icon">🌱</div>
                    <h3>تمارين الروح</h3> <p>للامتنان والسلام</p> 
                    <div class="floating-trigger">
                        <span class="tooltip-text">رسالة لقلبك ✨</span>
                        <div class="main-fab">
                            <i class="fas fa-magic"></i> 
                        </div>
                    </div>
                </div>
                <div class="step-card" onclick="openExercise('body')">
                    <div class="step-icon">🧘</div>
                    <h3>تمارين جسدية</h3> <p>لراحة الجسم</p> 
                    <div class="floating-trigger">
                        <span class="tooltip-text">رسالة لقلبك ✨</span>
                        <div class="main-fab">
                            <i class="fas fa-magic"></i> 
                        </div>
                    </div>
                </div>
                <div class="step-card" onclick="openExercise('mind')">
                    <div class="step-icon">🧠</div>
                    <h3>تمارين ذهنية</h3> <p>للصفاء والتركيز</p> 
                    <div class="floating-trigger">
                        <span class="tooltip-text">رسالة لقلبك ✨</span>
                        <div class="main-fab">
                            <i class="fas fa-magic"></i> 
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <div id="exerciseModal" class="modal">
            <div class="modal-content">
                <button class="close-btn" onclick="closeModal()">&times;</button>
                <div id="modalBody"></div>
                <button class="action-btn" onclick="closeModal()">تم، أشعر بتحسن</button>
            </div>
        </div>
    </main>
    <button id="backToTop" class="back-to-top" title="العودة للأعلى">
        <i class="fa-solid fa-chevron-up"></i>
    </button>  
    <footer class="w-full h-30 text-amber-50 bg-slate-900 flex flex-col justify-center items-center gap-2">
        <h6>صُنع بكل حب ليكون رفيقك في رحلة الطمأنينة.</h6>
        <p>جميع الحقوق محفوظة لـ كَيان &copy; 2026</p>
    </footer>
    <script src="JS/data.js"></script>
    <script src="JS/steps.js"></script>
</body>
</html>
